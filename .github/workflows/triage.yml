name: Triage

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  check-labels:
    name: Labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Set labels
        uses: actions/labeler@v6
